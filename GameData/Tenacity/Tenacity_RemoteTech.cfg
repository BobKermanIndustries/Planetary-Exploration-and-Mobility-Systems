//Remote Tech Compatibility - Needs further balancing

//Short Omni Antenna for probe core
@PART[CommonRoverBody]:NEEDS[RemoteTech]
{
	%MODULE[ModuleSPU]{}
	!MODULE[ModuleDataTransmitter],* {}
	%MODULE[ModuleRTAntennaPassive]
	{
		%TechRequired = unmannedTech
		%OmniRange = 3000

		%TRANSMITTER {
			%PacketInterval = 0.3
			%PacketSize = 2
			%PacketResourceCost = 15.0
		}
	}
	%MODULE[ModuleSPUPassive] {}
}

//Low Gain antenna - The low gain antenna on the real rover is for communications with orbiter - based on DP-10 from remotetech
@PART[BKI_LowGainAntenna]:NEEDS[RemoteTech]
{
	!MODULE[ModuleDataTransmitter] {}
	
	//not deployable
	@MODULE[ModuleAnimateGeneric],*
	{
		%allowManualControl = false
	}
	
	%MODULE[ModuleRTAntenna] {
		%Mode0OmniRange = 0
		%Mode1OmniRange = 500000
		%EnergyCost = 0.01
		
		%DeployFxModules = 0
		
		%TRANSMITTER {
			%PacketInterval = 5
			%PacketSize = 1
			%PacketResourceCost = 8
		}
	}
}

//High Gain antenna - the high gain antenna on the real rover is for orbital comms
@PART[BKI_UHFAntenna]:NEEDS[RemoteTech]
{
	!MODULE[ModuleDataTransmitter] {}
	
	//not deployable
	@MODULE[ModuleAnimateGeneric],*
	{
		%allowManualControl = false
	}
	
	%MODULE[ModuleRTAntenna] {
		%Mode0OmniRange = 0
		%Mode1OmniRange = 5000000
		%EnergyCost = 0.2
		
		%DeployFxModules = 0
		
		%TRANSMITTER {
			%PacketInterval = 0.75
			%PacketSize = 2
			%PacketResourceCost = 8
		}
	}
}

//High Gain Dish - The real antenna is directly connected to earth - based the range on RemoteTech HG-55
@PART[BKIMSLHGAntenna]:NEEDS[RemoteTech]
{
	!MODULE[ModuleDataTransmitter] {}
	
	//Deployable
	@MODULE[ModuleAnimateGeneric]
	{
		%allowManualControl = false
	}
	
	%MODULE[ModuleRTAntenna] {
		%Mode0DishRange = 0
		%Mode1DishRange = 25000000000
		%EnergyCost = 0.45
		%DishAngle = 0.5
		%DeployFxModules = 0
		
		%TRANSMITTER
		{
			%PacketInterval = 3
			%PacketSize = 2
			%PacketResourceCost = 10.0
		}
	}
	
	%MODULE[ModuleSPUPassive] {}
}
